<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lampstand — Scripture, in depth</title>
<meta name="description" content="A daily encounter system with the whole Bible. The Berean Standard Bible, encountered slowly." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://bible.helloao.org" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink-950:#07080a; --ink-900:#0b0d10; --ink-800:#111418; --ink-700:#1a1e24; --ink-600:#242931;
    --stone-50:#f7f4ee; --stone-100:#ece6d8; --stone-200:#d9cfb8; --stone-300:#b9ac90;
    --gold-50:#fbf3dc; --gold-100:#f1e2b0; --gold-200:#e4cb82; --gold-300:#cdae5f;
    --gold-400:#b08b3e; --gold-500:#8a6a2c; --gold-600:#6a5020; --gold-700:#4b3814;
    --bronze-400:#a06a3a; --bronze-500:#7c4f25;
    --ruby-400:#c44545;
    --serif:"Cormorant Garamond", Georgia, serif;
    --sans:"Inter", ui-sans-serif, system-ui, sans-serif;
  }
  *{box-sizing:border-box;border-color:rgba(205,174,95,.08)}
  html,body{margin:0;padding:0;background:var(--ink-950);color:var(--stone-100);font-family:var(--sans);-webkit-font-smoothing:antialiased;letter-spacing:.005em}
  body{
    min-height:100vh;
    background-image:
      radial-gradient(1200px 600px at 50% -10%, rgba(176,139,62,.12), transparent 60%),
      radial-gradient(800px 400px at 80% 100%, rgba(124,79,37,.10), transparent 60%);
    background-attachment:fixed;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.035;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode:overlay;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:rgba(205,174,95,.25);color:var(--gold-50)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(205,174,95,.2);border-radius:6px}

/* layout */
.container{max-width:72rem;margin:0 auto;padding:0 1.5rem;position:relative;z-index:2}
@media (min-width:768px){.container{padding:0 2.5rem}}
.hairline{height:1px;width:100%;background:linear-gradient(90deg,transparent,rgba(205,174,95,.3),transparent);margin:2.5rem 0}

/* nav */
header.nav{position:sticky;top:0;z-index:30;border-bottom:1px solid rgba(75,56,20,.25);background:rgba(7,8,10,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;gap:1rem}
.brand{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.brand-mark{width:2rem;height:2rem;border-radius:9999px;border:1px solid rgba(205,174,95,.3);background:rgba(176,139,62,.1);display:inline-flex;align-items:center;justify-content:center;color:var(–gold-200)}
.brand-name{font-family:var(–serif);font-size:1.25rem;letter-spacing:.02em;color:var(–stone-50)}
.kicker{font-size:.7rem;text-transform:uppercase;letter-spacing:.28em;color:rgba(205,174,95,.8)}
.nav-links{display:none;gap:.25rem}
@media (min-width:1000px){.nav-links{display:flex}}
.nav-link{padding:.4rem .85rem;border-radius:9999px;font-size:.875rem;color:rgba(236,230,216,.7);transition:color .2s;white-space:nowrap}
.nav-link:hover{color:var(–stone-50)}
.nav-link.active{background:rgba(176,139,62,.1);color:var(–gold-100)}
.nav-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.5rem 0 .9rem;-webkit-overflow-scrolling:touch}
@media (min-width:1000px){.nav-scroll{display:none}}
.nav-scroll a{white-space:nowrap;font-size:.72rem;padding:.35rem .7rem;border-radius:9999px;color:rgba(236,230,216,.7)}
.nav-scroll a.active{background:rgba(176,139,62,.1);color:var(–gold-100)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.2rem;border-radius:9999px;font-size:.875rem;font-family:inherit;transition:all .2s;text-decoration:none}
.btn-gold{border:1px solid rgba(205,174,95,.3);background:linear-gradient(180deg,rgba(205,174,95,.15),rgba(106,80,32,.1));color:var(–gold-100);font-weight:500}
.btn-gold:hover{border-color:rgba(205,174,95,.6);box-shadow:0 0 40px -8px rgba(205,174,95,.25);background:linear-gradient(180deg,rgba(205,174,95,.25),rgba(106,80,32,.15))}
.btn-gold:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{border:1px solid rgba(217,207,184,.1);color:rgba(236,230,216,.8)}
.btn-ghost:hover{border-color:rgba(217,207,184,.3);color:var(–stone-50)}
.btn-ghost:disabled{opacity:.3;cursor:not-allowed}
.btn-sm{padding:.4rem .85rem;font-size:.78rem}

/* chamber card */
.chamber{position:relative;border-radius:1rem;border:1px solid rgba(75,56,20,.2);background:rgba(11,13,16,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 30px 80px -20px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,220,160,.04)}

/* typography */
.serif{font-family:var(–serif)}
.gradient-text{background:linear-gradient(180deg,#f1e2b0,#b08b3e);-webkit-background-clip:text;background-clip:text;color:transparent}

/* page shell */
main.page{padding:3rem 0;animation:fade .6s ease-out;min-height:60vh}
@media(min-width:768px){main.page{padding:5rem 0}}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
h1.page-title{font-family:var(–serif);font-size:2.5rem;line-height:1.05;color:var(–stone-50);margin:0}
@media (min-width:768px){h1.page-title{font-size:3.75rem}}
p.page-sub{margin-top:1rem;max-width:42rem;font-size:1.125rem;color:rgba(236,230,216,.7);line-height:1.6}

/* hero */
.hero{position:relative;overflow:hidden;padding:6rem 0}
@media (min-width:768px){.hero{padding:9rem 0}}
.hero-title{font-family:var(–serif);font-size:3rem;line-height:1.05;color:var(–stone-50);max-width:56rem;margin:0;position:relative;z-index:2}
@media (min-width:768px){.hero-title{font-size:4.75rem}}
.hero-sub{margin-top:2rem;max-width:42rem;font-size:1.125rem;line-height:1.6;color:rgba(236,230,216,.75);position:relative;z-index:2}
.hero-ctas{margin-top:2.5rem;display:flex;flex-wrap:wrap;gap:.75rem;position:relative;z-index:2}
.hero-orb{position:absolute;right:-10%;top:5rem;width:520px;height:520px;border-radius:9999px;background:radial-gradient(circle,rgba(176,139,62,.2),rgba(124,79,37,.1) 45%,transparent 70%);filter:blur(40px);display:none;animation:breath 6s ease-in-out infinite}
@media(min-width:1000px){.hero-orb{display:block}}
@keyframes breath{0%,100%{opacity:.85}50%{opacity:1}}

/* grids */
.grid{display:grid;gap:1rem}
.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid-3{grid-template-columns:1fr}
.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
@media(min-width:768px){.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}}

/* tiles */
.tile{padding:1.25rem;display:flex;flex-direction:column;justify-content:space-between;transition:all .25s}
.tile:hover{border-color:rgba(205,174,95,.4);transform:translateY(-2px)}
.tile .tile-title{font-family:var(–serif);font-size:1.25rem;color:var(–stone-50)}
.tile:hover .tile-title{color:var(–gold-100)}
.tile-arrow{margin-top:1.25rem;color:rgba(205,174,95,.5);transition:transform .2s,color .2s}
.tile:hover .tile-arrow{transform:translateX(4px);color:var(–gold-200)}

.feature{padding:1.5rem;transition:all .25s;position:relative;overflow:hidden}
.feature:hover{border-color:rgba(205,174,95,.4);transform:translateY(-2px)}
.feature .icon{color:var(–gold-200);margin-bottom:1rem;display:block}
.feature-title{font-family:var(–serif);font-size:1.25rem;color:var(–stone-50)}
.feature-desc{margin-top:.5rem;font-size:.875rem;line-height:1.6;color:rgba(236,230,216,.7)}
.feature-arrow{position:absolute;bottom:1rem;right:1rem;color:rgba(205,174,95,.4);transition:color .2s}
.feature:hover .feature-arrow{color:var(–gold-200)}

/* Bible reader */
.reader-toolbar{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding:1rem;border-radius:.75rem;border:1px solid rgba(75,56,20,.2);background:rgba(17,20,24,.5)}
.reader-toolbar .left{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.reader-toolbar .right{display:flex;align-items:center;gap:.5rem}
.pill-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .85rem;border-radius:9999px;border:1px solid rgba(205,174,95,.2);background:rgba(11,13,16,.5);font-size:.8rem;color:var(–stone-100);transition:border-color .2s}
.pill-btn:hover{border-color:rgba(205,174,95,.5)}
.pill-btn.icon-only{padding:.4rem .55rem}
.reader-meta{font-family:var(–serif);font-size:1.875rem;color:var(–stone-50);margin:0}
@media(min-width:768px){.reader-meta{font-size:2.25rem}}
.reader-loading{padding:3rem 1rem;text-align:center;color:rgba(185,172,144,.5);font-style:italic;font-family:var(–serif);font-size:1.125rem}
.reader-error{padding:2rem;border-radius:.75rem;border:1px solid rgba(196,69,69,.3);background:rgba(196,69,69,.08);color:#f3c5c5;text-align:center;font-family:var(–serif);font-size:1.125rem}
.reader-error .err-detail{margin-top:.5rem;font-size:.8rem;font-style:italic;color:rgba(196,69,69,.7);font-family:var(–sans)}
.reader-content{padding:2rem;font-family:var(–serif)}
@media(min-width:768px){.reader-content{padding:3rem 3.5rem}}
.reader-heading{font-family:var(–serif);font-size:1.5rem;color:var(–gold-100);margin:2rem 0 .75rem;font-weight:500}
.reader-heading:first-child{margin-top:0}
.reader-subtitle{font-style:italic;color:rgba(217,207,184,.6);margin:0 0 1.25rem;font-size:1rem;font-family:var(–serif)}
.reader-verse{display:block;line-height:1.7;font-size:1.25rem;color:var(–stone-100);margin:.15rem 0;cursor:pointer;border-radius:.4rem;padding:.05rem .15rem;transition:background .2s}
.reader-verse:hover{background:rgba(205,174,95,.06)}
.reader-verse.selected{background:rgba(205,174,95,.12)}
.reader-verse .vnum{font-size:.7rem;font-family:var(–sans);color:var(–gold-300);margin-right:.4rem;vertical-align:.3em;font-weight:500;letter-spacing:.05em}
.reader-verse.poem{padding-left:1.5rem}
.reader-verse.poem-2{padding-left:3rem}
.reader-verse .wj{color:#d99a8a}
.reader-verse .fn{color:var(–gold-300);font-size:.65rem;vertical-align:.4em;margin:0 .1rem;text-decoration:none;font-family:var(–sans)}
.reader-verse .fn:hover{color:var(–gold-100)}
.reader-footnotes{margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid rgba(75,56,20,.25);font-family:var(–sans);font-size:.85rem;color:rgba(217,207,184,.7);line-height:1.6}
.reader-footnotes h4{font-family:var(–serif);color:var(–gold-200);font-size:1rem;margin:0 0 .75rem;font-weight:500}
.reader-footnotes ol{margin:0;padding-left:1.5rem}
.reader-footnotes li{margin-bottom:.5rem}
.reader-nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;gap:.75rem;flex-wrap:wrap}

/* verse action panel */
.verse-actions{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(120%);transition:transform .25s ease;z-index:40;display:flex;gap:.5rem;padding:.6rem;border-radius:9999px;border:1px solid rgba(205,174,95,.3);background:rgba(7,8,10,.92);backdrop-filter:blur(20px);box-shadow:0 20px 50px -10px rgba(0,0,0,.8)}
.verse-actions.show{transform:translateX(-50%) translateY(0)}
.verse-actions .ref{font-family:var(–serif);color:var(–gold-100);padding:.4rem .8rem;font-size:1rem;display:flex;align-items:center}

/* book picker modal */
.modal-bg{position:fixed;inset:0;background:rgba(7,8,10,.85);backdrop-filter:blur(8px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:5vh 1rem;overflow-y:auto}
.modal-bg.show{display:flex;animation:fade .2s ease}
.modal{width:100%;max-width:48rem;border-radius:1rem;border:1px solid rgba(75,56,20,.3);background:rgba(11,13,16,.95);box-shadow:0 30px 80px -20px rgba(0,0,0,.9);max-height:90vh;overflow-y:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(75,56,20,.2);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:rgba(11,13,16,.95);z-index:1}
.modal-header h3{font-family:var(–serif);color:var(–stone-50);font-size:1.5rem;margin:0}
.modal-close{color:rgba(217,207,184,.6);width:2rem;height:2rem;border-radius:9999px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(26,30,36,.6);color:var(–stone-50)}
.modal-body{padding:1.5rem}
.testament-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.28em;color:var(–gold-300);margin:1.25rem 0 .75rem}
.testament-label:first-child{margin-top:0}
.book-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.4rem}
@media(min-width:600px){.book-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(min-width:800px){.book-grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
.book-btn{padding:.6rem .8rem;border-radius:.5rem;border:1px solid rgba(75,56,20,.2);background:rgba(17,20,24,.5);color:var(–stone-100);font-size:.85rem;text-align:left;transition:all .2s;font-family:inherit;cursor:pointer}
.book-btn:hover{border-color:rgba(205,174,95,.5);background:rgba(176,139,62,.08);color:var(–gold-100)}
.chapter-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:.4rem}
@media(min-width:500px){.chapter-grid{grid-template-columns:repeat(8,minmax(0,1fr))}}
@media(min-width:768px){.chapter-grid{grid-template-columns:repeat(10,minmax(0,1fr))}}
.chapter-btn{padding:.55rem 0;border-radius:.4rem;border:1px solid rgba(75,56,20,.2);background:rgba(17,20,24,.5);color:var(–stone-100);font-size:.85rem;font-family:var(–serif);transition:all .2s;cursor:pointer}
.chapter-btn:hover{border-color:rgba(205,174,95,.5);background:rgba(176,139,62,.1);color:var(–gold-100)}

/* encounter flow */
.progress{display:flex;gap:.25rem;margin-bottom:2rem}
.progress-bar{height:3px;flex:1;border-radius:9999px;background:rgba(75,56,20,.2);transition:background .3s}
.progress-bar.on{background:rgba(205,174,95,.7)}
.enc-step{min-height:280px;animation:fade .4s ease}
.enc-passage{font-family:var(–serif);font-size:1.5rem;line-height:1.5;color:var(–stone-100)}
@media(min-width:768px){.enc-passage{font-size:1.875rem}}
.confront-item{font-family:var(–serif);border-left:2px solid rgba(205,174,95,.4);padding-left:1rem;font-size:1.25rem;font-style:italic;color:var(–stone-100);line-height:1.5}
.reflect-numbered{font-family:var(–serif);font-size:1.25rem;color:var(–stone-50);line-height:1.4}
.reflect-numbered .n{color:rgba(205,174,95,.6);margin-right:.75rem}
.textarea, .input{width:100%;border-radius:.75rem;border:1px solid rgba(75,56,20,.2);background:rgba(17,20,24,.6);padding:1rem;color:var(–stone-100);font-family:inherit;font-size:1rem;resize:none}
.textarea:focus, .input:focus{outline:none;border-color:rgba(205,174,95,.5)}
.textarea::placeholder, .input::placeholder{color:rgba(185,172,144,.3)}

/* timeline */
.tl-layout{display:grid;gap:2rem}
@media(min-width:900px){.tl-layout{grid-template-columns:260px 1fr}}
.tl-sidebar{padding:.75rem;height:max-content}
.tl-item{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .75rem;border-radius:.5rem;text-align:left;width:100%;font-size:.875rem;color:rgba(236,230,216,.7);transition:all .2s}
.tl-item:hover{background:rgba(17,20,24,.6)}
.tl-item.active{background:rgba(176,139,62,.1);color:var(–gold-100)}
.tl-badge{flex-shrink:0;width:1.5rem;height:1.5rem;border-radius:9999px;border:1px solid rgba(205,174,95,.2);font-size:.65rem;color:var(–gold-300);display:inline-flex;align-items:center;justify-content:center}
.tl-item .sub{font-size:.7rem;color:rgba(185,172,144,.55);margin-top:.15rem}
.tl-content{padding:2rem;animation:fade .4s ease}
@media(min-width:768px){.tl-content{padding:3rem}}
.figure{display:inline-block;padding:.25rem .75rem;border-radius:9999px;border:1px solid rgba(205,174,95,.2);background:rgba(17,20,24,.6);font-size:.875rem;color:var(–stone-100);margin:0 .3rem .3rem 0}

/* map */
.map-layout{display:grid;gap:1.5rem}
@media(min-width:900px){.map-layout{grid-template-columns:1.3fr 1fr}}
.map-wrap{aspect-ratio:5/4;position:relative;overflow:hidden}
.map-svg{position:absolute;inset:0;width:100%;height:100%}
.map-panel{padding:1.5rem;animation:fade .4s ease}
@media(min-width:768px){.map-panel{padding:2rem}}

/* themes */
.theme-card{padding:1.5rem;transition:all .25s}
.theme-card:hover{border-color:rgba(205,174,95,.4);transform:translateY(-2px)}
.theme-card .name{font-family:var(–serif);font-size:1.5rem;color:var(–stone-50);margin:.35rem 0}
.theme-card:hover .name{color:var(–gold-100)}
.theme-card .tl{font-style:italic;color:rgba(217,207,184,.7);margin:0 0 1rem}

/* journal */
.journal-layout{display:grid;gap:1.5rem}
@media(min-width:1024px){.journal-layout{grid-template-columns:1fr 1.3fr}}
.journal-entry{padding:1.5rem;animation:fade .3s ease}
.journal-entry h3{font-family:var(–serif);font-size:1.5rem;color:var(–stone-50);margin:0}
.journal-entry .body{margin-top:.75rem;white-space:pre-wrap;line-height:1.65;color:rgba(236,230,216,.85)}
.journal-attach{margin-top:.25rem;font-size:.75rem;color:var(–gold-200)}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border-radius:9999px;color:rgba(185,172,144,.4);transition:all .2s}
.icon-btn:hover{background:rgba(26,30,36,.6);color:var(–stone-50)}

/* search */
.search-box{display:flex;align-items:center;gap:.75rem;padding:1rem}
.search-box input{flex:1;background:transparent;border:none;color:var(–stone-50);font-size:1.125rem;font-family:inherit;min-width:0}
.search-box input::placeholder{color:rgba(185,172,144,.3)}
.search-box input:focus{outline:none}
.search-result{padding:1.25rem;transition:border-color .2s;margin-bottom:.75rem;display:block}
.search-result:hover{border-color:rgba(205,174,95,.4)}
.search-hint{font-size:.78rem;color:rgba(185,172,144,.45);margin-top:1.5rem;font-style:italic}

/* devotional */
.devotional{position:relative;min-height:calc(100vh - 80px);overflow:hidden;padding:3rem 1.25rem 5rem;display:flex;flex-direction:column;align-items:center}
.devotional::before{content:””;position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.7) 100%);pointer-events:none}
.dev-inner{position:relative;z-index:2;max-width:42rem;width:100%}
.dev-banner{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(176,139,62,.15)}
.dev-day-num{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(241,226,176,.55);margin-bottom:.5rem}
.dev-month-theme{font-family:var(–serif);font-style:italic;font-size:1.4rem;color:var(–gold);letter-spacing:.02em}
.dev-month-sub{font-size:.85rem;color:rgba(185,172,144,.6);margin-top:.4rem;font-style:italic}
.dev-progress-bar{margin-top:1.25rem;width:100%;max-width:24rem;margin-left:auto;margin-right:auto;height:2px;background:rgba(176,139,62,.12);border-radius:9999px;overflow:hidden}
.dev-progress-fill{height:100%;background:linear-gradient(90deg,var(–gold),var(–gold-light));transition:width .4s ease}
.dev-progress-meta{font-size:.7rem;color:rgba(185,172,144,.5);margin-top:.5rem;letter-spacing:.1em;text-transform:uppercase}

/* Title sits above scripture as a label, not a competitor */
.dev-title{font-family:var(–serif);font-size:1.4rem;line-height:1.2;color:rgba(241,226,176,.85);text-align:center;margin:1.5rem 0 .5rem;letter-spacing:.005em;font-style:italic;font-weight:400}
.dev-ref{text-align:center;font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(241,226,176,.6);margin-bottom:1.5rem}
.dev-ref a:hover{color:var(–gold-light)}

/* Scripture is the hero. Large, illuminated, central. */

.dev-scripture::after{content:close-quote;position:absolute;bottom:-.5rem;right:.5rem;font-size:3rem;font-family:var(–serif);color:rgba(176,139,62,.18);line-height:1}

/* Body is supporting commentary, not the headline */
.dev-body{font-family:var(–serif);font-size:1.05rem;line-height:1.75;color:rgba(231,225,210,.88);margin:0 0 2.5rem}

/* Prayer in its own bordered chamber */
.dev-prayer-block{padding:1.5rem 1.25rem;background:rgba(7,8,10,.35);border:1px solid rgba(176,139,62,.18);border-radius:.4rem;margin-bottom:2rem}

.dev-controls{margin-top:2rem;display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap}

.dev-linked{margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(176,139,62,.12)}
.dev-linked-label{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(241,226,176,.55);margin-bottom:1rem;text-align:center}
.dev-linked-grid{display:grid;grid-template-columns:1fr;gap:.75rem}

.dev-linked-card{display:block;padding:1rem 1.1rem;border:1px solid rgba(176,139,62,.2);border-radius:.4rem;background:rgba(7,8,10,.3);text-decoration:none;transition:all .15s}

.dev-linked-title{font-family:var(–serif);font-size:1.05rem;color:var(–gold-light);margin-bottom:.3rem}
.dev-linked-tone{font-size:.82rem;color:rgba(185,172,144,.7);font-style:italic;line-height:1.5}

.dev-section-label{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(241,226,176,.55);margin:3rem 0 1rem;text-align:center}

.dev-month-cell.current{border-color:var(–gold-light);box-shadow:0 0 0 1px var(–gold-light);color:var(–gold-light)}

.dev-year-toggle{margin-top:2rem;border-top:1px solid rgba(176,139,62,.12);padding-top:1.25rem}

.dev-year-toggle summary:hover{color:var(–gold)}
.dev-year-toggle[open] summary{margin-bottom:1rem;color:var(–gold)}
.dev-year-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(.75rem,1fr));gap:2px;max-width:100%}
.dev-year-cell{aspect-ratio:1;border:1px solid rgba(176,139,62,.15);border-radius:1px;cursor:pointer;background:transparent;padding:0;transition:all .1s}
.dev-year-cell:hover{border-color:var(–gold);transform:scale(1.4);z-index:2;position:relative}
.dev-year-cell.done{background:rgba(176,139,62,.45);border-color:var(–gold)}

.dev-year-cell.today{background:var(–gold-light)}
.dev-year-legend{display:flex;justify-content:center;gap:1rem;margin-top:1rem;font-size:.7rem;color:rgba(185,172,144,.6);flex-wrap:wrap}
.dev-year-legend span{display:inline-flex;align-items:center;gap:.4rem}
.legend-cell{display:inline-block;width:.7rem;height:.7rem;border:1px solid rgba(176,139,62,.3);border-radius:1px}
.legend-cell.done{background:rgba(176,139,62,.45);border-color:var(–gold)}
.legend-cell.current{outline:1px solid var(–gold-light);outline-offset:1px}
.legend-cell.today{background:var(–gold-light);border-color:var(–gold-light)}

/* dashboard */
.dash-grid{display:grid;gap:1.5rem;grid-template-columns:1fr}
@media(min-width:900px){.dash-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.dash-card{padding:1.5rem}
.dash-card .row{padding:.75rem 0;border-bottom:1px solid rgba(75,56,20,.15)}
.dash-card .row:last-child{border-bottom:none}
.dash-card .ttl{font-family:var(–serif);font-size:1.125rem;color:var(–stone-50);margin:.2rem 0 0}
.dash-card .empty{font-size:.875rem;color:rgba(185,172,144,.5)}
.progress-track{width:100%;height:.5rem;overflow:hidden;border-radius:9999px;background:rgba(26,30,36,.6)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–gold-400),var(–gold-200))}

/* tags */
.tag{display:inline-block;padding:.25rem .75rem;border-radius:9999px;border:1px solid rgba(205,174,95,.2);background:rgba(17,20,24,.5);font-size:.75rem;color:var(–gold-200);margin:0 .25rem .25rem 0;transition:border-color .2s}

.mini-tag{display:inline-block;padding:.15rem .55rem;border-radius:9999px;border:1px solid rgba(75,56,20,.3);font-size:.62rem;text-transform:uppercase;letter-spacing:.18em;color:rgba(205,174,95,.8);margin:0 .25rem .25rem 0}

/* footer */
footer{border-top:1px solid rgba(75,56,20,.15);padding:2.5rem 0;font-size:.875rem;color:rgba(217,207,184,.45);position:relative;z-index:2}

footer .credit{font-size:.72rem;color:rgba(217,207,184,.35);margin-top:.5rem}
.italic{font-style:italic}

/* misc */
.stack-3{display:flex;flex-direction:column;gap:.75rem}
.stack-4{display:flex;flex-direction:column;gap:1rem}
.stack-5{display:flex;flex-direction:column;gap:1.25rem}
.row-gap-2{display:flex;flex-wrap:wrap;gap:.5rem}
.row-gap-3{display:flex;flex-wrap:wrap;gap:.75rem}
.end{display:flex;justify-content:flex-end}
.between{display:flex;align-items:center;justify-content:space-between}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mt-2{margin-top:.5rem}.mt-3{margin-top:.75rem}.mt-4{margin-top:1rem}.mt-6{margin-top:1.5rem}.mt-8{margin-top:2rem}.mt-10{margin-top:2.5rem}
.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-6{margin-bottom:1.5rem}.mb-8{margin-bottom:2rem}
.text-gold{color:var(–gold-200)}
.text-stone{color:rgba(236,230,216,.85)}
.text-muted{color:rgba(236,230,216,.6)}
.text-sm{font-size:.875rem}
.text-xs{font-size:.75rem}
.hidden-sm{display:none}

/* ============================================================

const ENCOUNTERS=[
  {id:"fear",label:"Fear",tone:"For the one whose chest is tight and whose mind will not stop rehearsing.",passage:{book:"PSA",chapter:23,verses:[4]},
    opening:"You do not need a better grip on your fear. You need a better grip from the Shepherd. Read the passage slowly, as if you were the sheep.",
    context:"David wrote this after years of being hunted. The valley of the shadow of death is not a poetic device. It is a geographical feature — narrow ravines in Israel where predators waited. David is describing a real place where he was once the prey.",
    insight:"Notice the pronoun shift. The earlier verses speak of God in the third person — 'He.' Verse 4 turns and speaks to Him directly — 'You.' Fear does not drive the Shepherd away. It pulls Him closer. The valley is where the relationship gets personal.",
    confront:["You are not afraid because God is absent. You are afraid because you have forgotten He is present.","Name the specific fear. Stop calling it 'stress.'","Whose voice have you been listening to more than His?"],
    reflect:["What would change if you believed, right now, that He is with you in this specific valley?","Where has fear become a kind of false god — demanding your attention, shaping your decisions?","When did you last stop running long enough to let Him walk with you?"],
    apply:"Do one thing today that fear has been telling you not to do. Start small. Send the message. Make the call. Take the step. Do it with Him, not around Him.",

  {id:"pressure",label:"Pressure / Burnout",tone:"For the one whose shoulders ache from things they were never meant to carry.",passage:{book:"ISA",chapter:40,verses:[28,31]},
    opening:"Before you try to rest better, correct your picture of God. Burnout is often a theology problem disguised as a scheduling problem.",
    context:"Isaiah 40 is spoken to exiles who had concluded their God was tired — defeated, absent, outclassed. Isaiah's response is not 'try harder.' It is 'look higher.'",
    insight:"The order in verse 31 matters: mount, run, walk. The descent is the miracle. Soaring is easy in a good week. Still walking on a Tuesday when nothing feels like it is working — that is what the text is actually promising.",
    confront:["You are exhausted because you have been carrying what only He can carry.","You have mistaken urgency for calling. Not everything that feels important is yours.","Stop treating Sabbath as a productivity hack. It is an act of trust — and refusal is a form of idolatry."],
    reflect:["What are you doing that He never asked you to do?","Whose approval are you really chasing?","If you stopped tomorrow, what are you afraid would collapse?"],
    apply:"Identify one thing this week you are doing out of fear, not calling. Name it. Then say no to it. Put the 'no' on your calendar.",
    prayer:"Everlasting God, You do not faint. I do. I have been running on self. Forgive me. I hand back the things that were never mine. Renew the strength I cannot manufacture."
  },
  {id:"doubt",label:"Doubt",tone:"For the one who still prays but no longer knows if anyone is listening.",passage:{book:"ROM",chapter:8,verses:[38,39]},
    opening:"Doubt is not the opposite of faith. Indifference is. If you are here wrestling, you are already closer than you think.",
    context:"Paul writes to Christians who were about to face Nero's Rome. He does not answer their doubts with easy assurances. He stacks the whole cosmos against the love of God — and the cosmos loses.",
    insight:"Notice what is not on Paul's list of things that could separate us. Your failure is not on the list. Your dry season is not on the list. Your questions are not on the list. Nothing you have done or feared is strong enough to outrank the love of God in Christ.",
    confront:["Your doubt is not stronger than His hold.","You are not the first to feel this. You are not the exception to the promise.","Stop waiting to 'feel it' before you obey. Obedience in fog is still obedience."],
    reflect:["What unspoken thing are you afraid has finally disqualified you?","Whose voice have you been mistaking for God's — an old pastor, a parent, your own inner critic?","What would it cost you to keep walking even if the feelings do not come back this week?"],
    apply:"Keep doing the next small, faithful thing. Pray a single honest sentence. Read one verse. Show up in one place. Do not try to solve the doubt — outlast it.",
    prayer:"Father, I am not sure of much right now. I am sure of this: I would not be here, asking, if You had let me go. Hold me even when I cannot hold anything."
  },
  {id:"purpose",label:"Purpose / Direction",tone:"For the one standing at a crossroads, tired of second-guessing.",passage:{book:"JHN",chapter:15,verses:[5]},
    opening:"Before you ask what to do, ask where to stay. The Christian life is not a decision tree. It is a vine.",
    context:"Jesus speaks these words hours before His arrest. He is not giving career advice. He is reframing how a life bears anything real. The fruit you are longing for is downstream of the connection you are neglecting.",
    insight:"'Apart from me you can do nothing.' This is not false humility. It is accurate botany. A severed branch can look green for a while. Then it dies. A lot of 'purpose' crises are severed-branch crises.",
    confront:["You are looking for a plan when He is offering Himself.","You have confused calling with clarity. Calling is usually given one step at a time.","You cannot find your purpose by searching harder. You find it by staying closer."],
    reflect:["Are you abiding, or are you performing?","If God showed you the whole path tomorrow, would it grow your faith — or your self-reliance?","What one small obedience have you been postponing while waiting for a big vision?"],
    apply:"This week, stop asking 'what should I do with my life?' and start asking 'what should I do today with Him?' Do that. Then do it tomorrow.",
    prayer:"Vine of my life, I have been trying to bear fruit on a severed branch. Graft me back in. I do not need the whole plan. I need You for the next step."

  {id:"failure",label:"Failure / Shame",tone:"For the one who cannot stop replaying what they have done.",passage:{book:"ROM",chapter:8,verses:[1]},
    opening:"You have been re-trying a case God has already closed. Put down the gavel.",
    context:"Paul has just finished a confession of his own ongoing battle with sin in chapter 7 — 'the good I want to do, I do not do.' Chapter 8 does not deny the battle. It denies the verdict.",
    insight:"'No condemnation' is in the present tense. Not 'one day.' Not 'if you clean up.' Now. The same Paul who wrote this had approved of the stoning of Stephen. If there is grace for him, there is grace for you.",
    confront:["The voice accusing you is not always the voice of God. Sometimes it is shame wearing His clothes.","You are not your worst day. You are not your last failure. You are hidden in Christ.","Wallowing is not repentance. It is pride in reverse."],

    apply:"Write down the sin. Then write 'It is finished' across it. Then destroy the paper. You do not keep receipts for things that have already been paid.",

  {id:"discipline",label:"Discipline / Laziness",tone:"For the one who knows what to do and keeps not doing it.",passage:{book:"MAT",chapter:5,verses:[6]},
    opening:"You are not lacking willpower. You are lacking hunger. And hunger is a gift you can ask for.",
    context:"Jesus pronounces blessing on those who hunger and thirst for righteousness. Notice — He does not bless the righteous. He blesses the ones who ache for it. Desire precedes discipline.",
    insight:"Laziness is rarely just laziness. It is usually mis-directed appetite. You are feeding something else — scrolling, numbing, eating, achieving elsewhere — and it is deadening the hunger that would actually move you.",
    confront:["Your phone is not your problem. Your appetite is.","You are not tired. You are numb. There is a difference.","Discipline does not come from hating yourself. It comes from wanting something more than you want comfort."],
    reflect:["What are you feeding that is killing your hunger for God?","What is one small, quiet, unwatched obedience you have been avoiding?","If no one ever saw your faithfulness, would you still pursue it?"],
    apply:"Pick one input today you will fast from — a habit, a feed, a snack, a check. Redirect that hunger into one act of faithfulness, no matter how small.",
    prayer:"Jesus, my appetite is broken. I have been eating what does not nourish. Teach me to hunger for You. Make the craving for righteousness stronger than the craving for comfort."
  },
  {id:"grief",label:"Grief",tone:"For the one carrying a loss that will not lift.",passage:{book:"PSA",chapter:23,verses:[4]},
    opening:"You do not need a sermon right now. You need a Shepherd. Let the words be short. Let the presence be long.",
    context:"David wrote this from inside real sorrow. Psalms are not composed in sunlight. They are composed in the dark and only later read in the light.",
    insight:"'Through the valley.' Not around. Not over. Through. Grief is a road you walk, and the only promise is that you do not walk it alone. That promise is enough.",
    confront:["You do not have to 'be okay' to be with Him. He walks with the not-okay.","Do not rush what God is not rushing.","Tears are a form of prayer when words will not come."],
    reflect:["What are you mourning that you have not let yourself name?","Where have well-meaning voices rushed you past your grief?","What would it look like to grieve honestly without trying to explain God to yourself?"],
    apply:"Find a place today where you can be alone and quiet for ten minutes. No phone. Let yourself feel. Let Him sit with you. You do not need to produce anything.",
    prayer:"Shepherd, I am in the valley. I do not know how long it is. I am tired. I will not pretend otherwise. Walk with me. That is all I am asking for right now."
  },
  {id:"pride",label:"Pride",tone:"For the one who keeps winning arguments and losing peace.",passage:{book:"MAT",chapter:5,verses:[3]},
    opening:"The first requirement of the kingdom is knowing you have nothing to bring. This is harder than it sounds.",
    context:"Jesus opens His central teaching with a line that inverts everything His listeners assumed. Blessedness does not belong to the accomplished. It belongs to the bankrupt.",
    insight:"Pride is often invisible to the proud. You will not notice it in yourself. You will notice it in how you react when you are corrected, overlooked, or contradicted. Pay attention to your reactions — they will tell you the truth your self-image is hiding.",
    confront:["You do not have it as together as you think. And that is not an insult — it is an invitation.","You have been building a reputation God never asked you to build.","The person who most irritates you is probably holding up a mirror."],
    reflect:["Where have you been earning admiration instead of seeking God?","Who in your life have you stopped listening to because you think you know better?","When did you last apologize without qualifying it?"],
    apply:"Today, make yourself small on purpose. Ask someone you have been dismissing for their opinion — and actually listen. Do one thing for which you will get no credit.",
    prayer:"Father, I am poor in spirit, and I have been acting otherwise. Empty me of the pretense. Give me the gift of smallness. I would rather be hidden with You than impressive without You."
  },
  {id:"temptation",label:"Temptation",tone:"For the one staring at the same pattern again.",passage:{book:"PHP",chapter:4,verses:[6,7]},
    opening:"You are not weak for being tempted. You are weak when you face it alone. Let Him in before the fall, not only after.",
    context:"Paul writes from prison — a place where many comforts were stripped away and every unmet desire had opportunity to fester. He knows what it is to face the pull of the flesh without easy exits.",
    insight:"Peace that guards. Not peace that numbs. Peace that stands sentinel. The defense against temptation is not white-knuckled willpower — it is a garrisoned mind.",
    confront:["You keep trying to fight this in private. That is why it keeps winning.","You do not fall at the moment of temptation. You fall hours earlier — when you let your mind wander unguarded.","Confess the pattern to someone today. Shame loses its power in the light."],
    reflect:["What hunger is this temptation actually trying to meet?","What does your pattern tell you about what you actually believe about God?","Who is the person you need to be honest with — and why have you avoided them?"],
    apply:"Identify the specific trigger — time, place, mood, device. Build one small wall around it today. Cut one feed. Move one phone. Tell one friend.",
    prayer:"Father, guard the gate of my mind. I cannot guard it alone. I confess the pattern. I do not want to keep doing this. Meet me before the fall, not only after."
  },
  {id:"loneliness",label:"Loneliness",tone:"For the one who is surrounded and still feels unknown.",passage:{book:"ROM",chapter:8,verses:[38,39]},
    opening:"You are not alone in feeling alone. And the One who walks with you through this is not going anywhere.",
    context:"Paul's list of things that cannot separate us from God is the list of things that most feel like they have separated us. He writes it from a place of long isolation. He is not theorizing.",
    insight:"Loneliness tells you a lie — that you are forgotten, that you do not matter, that no one sees. The cross says otherwise. You were worth dying for before you were worth noticing.",
    confront:["Loneliness often hides from intimacy rather than seeks it. Who have you been pushing away while claiming no one is there?","Social media is not company. Stop mistaking the noise for presence.","Being known by God does not remove the need for human presence — but it reframes the ache."],
    reflect:["What kind of loneliness is this — isolation, disconnection, or grief over what once was?","Have you told anyone, clearly, that you are lonely?","What community have you been avoiding because it requires you to show up imperfect?"],
    apply:"Reach out to one person today — not to ask for anything, but to be honest. A short message is enough. Then step into one place this week where you can be seen in person.",
    prayer:"Father, I feel alone, and I know I am not. Help those two things be true at the same time. Bring me people. Give me the courage to be known."
  },
  {id:"anger",label:"Anger",tone:"For the one whose jaw is clenched and heart is hot.",passage:{book:"JAS",chapter:1,verses:[19,20]},
    opening:"Your anger is a diagnostic, not a verdict. It is telling you what you love. Pay attention.",
    context:"James writes to scattered Christians under pressure. 'Slow to anger' is not advice for calm days. It is a survival rule for hot ones.",
    insight:"Righteous anger is slow, specific, and sacrificial. Self-righteous anger is fast, sweeping, and self-serving. Check which one you have. The fruit will tell you.",
    confront:["Your anger may be just. Your handling of it may not be.","You have been rehearsing the injury. That is not processing — it is feeding.","Some of your anger is grief you have not named."],
    reflect:["What exactly happened — and what story have you added on top of what happened?","What do you actually want? Justice? Acknowledgement? Revenge?","Who have you refused to forgive because forgiving feels like losing?"],
    apply:"Write out what happened, plainly, without editorial. Then ask: what outcome would glorify God here? Take one step toward that outcome today.",
    prayer:"Father, I am angry. You are not afraid of it. Sift it for me. Show me what is from You and what is from my pride. Give me the courage to act on the first and lay down the second."
  },
  {id:"hope",label:"Hope Deferred",tone:"For the one who has been waiting a long time.",passage:{book:"ISA",chapter:40,verses:[31]},
    opening:"The promise is not that the waiting will end soon. The promise is that the waiting will not empty you.",
    context:"Isaiah speaks to a people who had been waiting for decades. Generations had been born and died in exile. The promise of return seemed to be evaporating. Into that, Isaiah speaks.",
    insight:"The Hebrew word for 'wait' shares a root with the word for a cord. Waiting well is not limp. It is woven. It is strength formed in tension. You are not wasting this season. It is forming something.",
    confront:["You have been asking God when. He has been asking you whether — whether you will trust Him if the answer is 'not yet.'","Your disappointment is real. It is not the whole story.","Stop measuring God's faithfulness by your timeline."],
    reflect:["What have you been waiting for — and what has the waiting revealed about what you truly want?","Is there something God is forming in you that requires this exact delay?","Would you still worship Him if the answer never came?"],
    apply:"This week, refuse to let the waiting define you. Do one small, faithful thing today as if the promise were already kept. Show up. Serve. Pray.",
    prayer:"Lord, I am tired of waiting. You know. I will not pretend. Renew my strength — not around the waiting, but inside it. Let me still walk when I cannot run."
  },
  {id:"anxiety",label:"Anxiety",tone:"For the one whose thoughts will not stop spinning.",passage:{book:"PHP",chapter:4,verses:[6,7]},
    opening:"Anxiety is not solved by trying harder to be calm. It is unseated by being given somewhere to take it.",
    context:"Paul writes from a Roman prison awaiting a verdict that may cost him his life. 'Do not be anxious' is not advice from someone with options.",
    insight:"The peace promised here 'guards' — military language. The Greek picture is of a sentry posting at the gate of your mind. You do not generate this peace. You are given it.",
    confront:["You have been treating anxiety like a personality, not like a guest who has overstayed.","You are praying about it in general but not handing over the specific.","Your what-ifs have replaced your wonder."],
    reflect:["What specific worry have you been rehearsing instead of releasing?","What thanksgiving could replace the rumination, even briefly?","What would it look like to trust without needing to know the outcome first?"],
    apply:"Right now, name three specific things you are worried about. Pray each one out loud. Then name three specific things you are thankful for. Do not skip the second list.",
    prayer:"Father, I have been spinning. Take the specifics, not just the general. Post Your peace at the gate of my mind. Stand watch where I cannot."
  },
  {id:"depression",label:"Depression / Heaviness",tone:"For the one who is just trying to make it through today.",passage:{book:"PSA",chapter:42,verses:[5,11]},
    opening:"You are not failing. You are tired. There is a difference, and Scripture knows it.",
    context:"Psalm 42 is written by someone who is preaching to himself — 'Why are you cast down, O my soul?' The text models the fight. It does not pretend the heaviness is not real.",
    insight:"Notice the pattern: the psalmist remembers, then questions, then commands his own soul to hope. He does not wait until he feels it. He speaks the truth toward the feeling, not from it.",
    confront:["You may not be able to lift yourself. You can speak truth toward yourself.","Heaviness is not proof of God's absence. The Psalms are full of it.","Some seasons are not problems to be solved. They are storms to be walked through with Him."],
    reflect:["What truth do you need to preach to yourself today, even if you do not feel it?","Who in your life have you been hiding this from?","What is the smallest faithful step you can take in the next hour?"],
    apply:"Do one tiny act of life today — eat something good, step outside, text one person, read one verse. Heaviness loses by inches.",
    prayer:"God, I do not have much. I have showing up. I bring You that. Hold me through this hour. Then the next."
  },
  {id:"jealousy",label:"Jealousy / Envy",tone:"For the one watching someone else get what they wanted.",passage:{book:"JAS",chapter:3,verses:[14,15,16]},
    opening:"Envy is honest about what you want, and dishonest about who gives it. Both halves of that need attention.",
    context:"James writes against 'bitter jealousy' as a kind of wisdom — but a wisdom from below. He names the thing the church refuses to name in itself.",
    insight:"Envy reveals two things: what you actually treasure, and how little you trust the One who allots. Idol and unbelief, working together.",
    confront:["You are not angry with them. You are angry with God for what He did not give you.","Comparison is the quickest way to forget what you already have.","The voice telling you 'it should have been me' is not the Spirit."],
    reflect:["What gift have you stopped seeing because you have been staring at theirs?","If you got what they have, what would still be missing in you?","Can you bless them, out loud, today?"],
    apply:"Speak well of the person you envy. To others, and to God. Watch what loosens.",
    prayer:"Father, I have been counting their blessings instead of mine. Forgive the bitterness. Make me glad in what You have given them, and grateful for what You have given me."
  },
  {id:"unbelief",label:"Unbelief",tone:"For the one who believes, and also doesn't.",passage:{book:"MRK",chapter:9,verses:[23,24]},
    opening:"'I believe; help my unbelief.' That single sentence may be the most honest prayer in Scripture. Use it.",
    context:"A father brings his suffering son to Jesus' disciples. They cannot help. He turns to Jesus with a half-prayer that shocks no one in the kingdom: I have faith. I also don't. Both are true.",
    insight:"Jesus does not rebuke the man for the unbelief. He answers the prayer he actually prayed. Mixed faith is not rejected faith. It is the only kind most of us have.",
    confront:["You have been waiting for certainty before you ask. Ask anyway.","Your unbelief is not a wall He cannot pass.","Saying 'help my unbelief' is more faithful than pretending you have none."],
    reflect:["Where in your life have you stopped asking because you stopped believing the asking would matter?","What would it look like to bring Him your half-faith today?","Is there a specific area where you need Him to grow what you have?"],
    apply:"Pray, today, the prayer of Mark 9:24. Out loud. About one specific thing.",
    prayer:"Lord, I believe. Help my unbelief. You see both. Meet both."
  },
  {id:"forgiveness",label:"Forgiveness Withheld",tone:"For the one who knows they should forgive, and isn't.",passage:{book:"MAT",chapter:18,verses:[21,22]},
    opening:"Forgiveness is not pretending it didn't happen. It is refusing to let it keep happening inside you.",
    context:"Peter asks if forgiving seven times is enough. Jesus answers seventy-seven (or seventy times seven). The number is not a math problem. It is a posture problem.",
    insight:"Unforgiveness is a kind of self-imprisonment. You think you are holding on to something against them. You are mostly holding on to something against yourself.",
    confront:["You have been replaying the injury until it is more vivid than the present.","Forgiveness does not mean trust restored. It means bitterness released.","Some of what you call 'them' is now you.'"],
    reflect:["Whose name comes up when you read this?","What would your next month look like without the weight you have been carrying for them?","Is there a step toward forgiveness — not feeling it, but choosing it — you can take today?"],
    apply:"Say their name out loud. Say 'I release them.' Even if the feelings have not caught up. Especially then.",
    prayer:"Father, You forgave me when I had no right to ask. Teach my hands to open. Let what I have been clutching go."
  },
  {id:"identity",label:"Identity",tone:"For the one who keeps trying to figure out who they are.",passage:{book:"EPH",chapter:1,verses:[4,5]},
    opening:"You will not find yourself by looking inward. You will find yourself by looking up.",
    context:"Paul opens Ephesians with a single Greek sentence that runs for verses — a torrent of identity statements rooted not in self-discovery but in divine choosing.",
    insight:"You were chosen before the foundation of the world. Your identity is not something you build. It is something you receive.",
    confront:["You have been auditioning for an identity Christ already gave you.","Performance and identity are not the same thing.","The voice constantly redefining you is not the Father's."],
    reflect:["Whose voice have you been letting define you most?","What would change if you actually believed you were already chosen, already loved?","Where have you been earning what He has already given?"],
    apply:"Write down five identity statements from Ephesians 1. Read them aloud. Read them tomorrow.",
    prayer:"Father, I have been searching for myself in the wrong places. Anchor me in what You have already declared. Let me stop auditioning."
  },
  {id:"comparison",label:"Comparison",tone:"For the one whose feed is making them smaller.",passage:{book:"GAL",chapter:6,verses:[4,5]},
    opening:"Comparison kills both gratitude and calling. It is cheaper than holiness and much louder.",
    context:"Paul ends Galatians with a quiet command: each one should test his own work. Not measure himself by others. The freedom of the gospel includes freedom from the tape measure.",
    insight:"You will never run your race well while watching theirs.",
    confront:["You have been treating someone else's life like a referendum on yours.","The voice telling you 'you are behind' is not God's. He is not measuring.","Some of what you envy in them is hiding a cost you would not pay."],
    reflect:["Whose life have you been using to grade yours?","What faithfulness have you minimized because it didn't get applause?","What would it look like to celebrate them and steward your own?"],
    apply:"Mute or unfollow the accounts that have been quietly grading you. Just for a week. Watch what comes back.",
    prayer:"Father, I have been peeking over the fence at their field. Pull my eyes back to mine. Make me grateful for the seeds You handed me."
  },
  {id:"control",label:"The Need to Control",tone:"For the one who keeps trying to manage everything.",passage:{book:"PRO",chapter:3,verses:[5,6]},
    opening:"Trust is not the absence of effort. It is the absence of clutching.",
    context:"Solomon's instruction is poetic and severe: lean not on your own understanding. Acknowledge Him in all your ways. The promise — He will direct your paths — is for the one who has stopped trying to map them alone.",
    insight:"Control is often grief or fear in costume.",
    confront:["You have been treating your understanding as a god.","The energy you spend trying to control everything is energy not spent trusting anything.","White-knuckled faith is not the kind He asks for."],
    reflect:["What in your life have you been clutching that He has been waiting for you to release?","What would 'acknowledge Him in all your ways' look like in the next twenty-four hours?","Where would surrender actually save you energy?"],
    apply:"Identify one decision today where you have been over-engineering the outcome. Pray. Take the next obvious step. Stop spinning.",
    prayer:"Father, I have been trying to be God in my own life. Forgive me. I lean. I trust. Direct my paths."
  },
  {id:"bitterness",label:"Bitterness",tone:"For the one whose heart has slowly hardened.",passage:{book:"HEB",chapter:12,verses:[14,15]},
    opening:"Bitterness is sown small. It does not stay small.",
    context:"Hebrews warns against a 'root of bitterness' that springs up and defiles many. The image is agricultural. Bitterness is not a feeling. It is a plant.",
    insight:"You can do everything right outwardly and still be eaten by something inwardly that you have not named.",
    confront:["The grudge you have stopped feeling is not gone. It has gone underground.","Bitterness is not your enemy's victory. It is yours, against yourself.","You have been calling it 'realism.' That is its disguise."],
    reflect:["What name comes up when you read 'root of bitterness'?","What would it cost you to let it go?","What would it cost you to keep holding it?"],
    apply:"Name the bitterness. Confess it as sin, not just feeling. Begin again, today.",
    prayer:"Father, dig out what I have been protecting. The root, not just the leaf. I cannot do this with niceness. Do it with grace."
  },
  {id:"trust",label:"Trust / Surrender",tone:"For the one who knows the next step is to let go.",passage:{book:"PRO",chapter:3,verses:[5,6]},
    opening:"Surrender is not weakness. It is precision — handing the right things to the right hands.",
    context:"Proverbs 3 is wisdom literature: tested, distilled, gentle. The instruction is the kind a father gives a son who he loves and is about to release.",
    insight:"Trust is not generic. It is specific. He asks you to trust Him with this — the thing you are most afraid to release.",
    confront:["You have been carrying this because you do not believe He will.","Surrender is not one-time. It is daily, and sometimes hourly.","The hands you have been clenching have hurt no one but yourself."],
    reflect:["What is the specific thing He is asking you to entrust to Him today?","What is your fear about what He might do with it?","What is the lie underneath the unwillingness to release?"],
    apply:"Speak it out loud, by name. 'Father, I give You ___.' Then breathe. Then act in line with that surrender.",
    prayer:"Lord, You are trustworthy with what I cannot trust myself. I open my hands. Take what I have been guarding. I will not take it back."
  },
  {id:"calling",label:"Calling",tone:"For the one wondering if they should make the move.",passage:{book:"EPH",chapter:2,verses:[10]},
    opening:"You were not made for general usefulness. You were made for specific works, prepared in advance.",
    context:"Paul writes that we are God's workmanship — His poiema, His poem — created for good works that He had in mind for you, before time.",
    insight:"Your calling is not something you invent. It is something you discover, often in the doing.",
    confront:["You have been waiting for a sign when He has been giving you opportunities.","Calling is rarely felt before it is acted on.","'I'm not ready' is sometimes obedience. Often it is excuse."],
    reflect:["What 'good work' have you sensed but kept postponing?","What would obedience in the next thirty days actually look like?","Whose 'permission' are you still waiting for?"],
    apply:"Take the smallest concrete step toward the calling today. A call. A sentence. A signup. Move.",
    prayer:"Father, You have prepared works for me. I have been preparing excuses. Forgive the delay. I take the next step."
  },
  {id:"mercy",label:"Receiving Mercy",tone:"For the one who has not let themselves be loved by Him.",passage:{book:"LAM",chapter:3,verses:[22,23]},
    opening:"His mercies are new every morning. Not most mornings. Every. Including the one after you blew it.",
    context:"Lamentations is the wreckage of Jerusalem. In the middle of national grief, the prophet remembers — His steadfast love. His mercies new every morning. Hope rises in the rubble.",
    insight:"You can know mercy intellectually and never receive it personally. The difference is in whether you let it interrupt your self-loathing.",
    confront:["You have been earning what He gives away.","Self-rejection is not humility. It is a refusal to take Him at His word.","You owe Him the courtesy of believing what He says about you."],
    reflect:["What would change today if mercy actually lands?","What old verdict on yourself are you still running from?","Will you stop, right now, and receive?"],
    apply:"Sit for two minutes. Receive. Do not perform. Do not pray. Just let mercy be true.",
    prayer:"Father, Your mercies are new this morning. I receive. Not because I deserve. Because You are."
  },
  {id:"faith",label:"Faith Under Pressure",tone:"For the one whose faith is being tested in real time.",passage:{book:"JAS",chapter:1,verses:[2,3,4]},
    opening:"The trial is not the end of faith. It is its formation.",
    context:"James writes to scattered, suffering Christians — and tells them to count it joy. Not because pain is good. Because pain that drives them to Him produces what comfort never could.",
    insight:"Steadfastness is not a feeling. It is what is left after the storm has stripped away everything that wasn't real.",
    confront:["You have been asking Him to remove what He intends to use.","Maturity is not a vibe. It is the slow forging of a soul.","The worst thing about your trial is not that it is hard. It is that you are tempted to waste it."],
    reflect:["What is this season trying to teach you that easier seasons could not?","Where have you been resisting the formation?","What would it mean to count this joy — not deny the pain?"],
    apply:"Identify one specific way this trial is forming you. Cooperate with it today.",
    prayer:"Father, I will not waste this. Make me steadfast, not just relieved. Form what cannot be formed otherwise."
  },
  {id:"wisdom",label:"Decision / Needing Wisdom",tone:"For the one staring at a hard choice.",passage:{book:"JAS",chapter:1,verses:[5]},
    opening:"You do not lack information. You lack wisdom — and you can ask for it.",
    context:"James writes plainly: if any of you lacks wisdom, ask God, who gives generously and without reproach. The promise is shockingly bare.",
    insight:"Wisdom is the ability to live well in the real world before the real God. It is not data. It is discernment, and He gives it.",
    confront:["You have been Googling what He wants you to ask Him for.","Some 'praying about it' is just delaying obedience.","You may already know — and just do not want to do it."],
    reflect:["What decision is in front of you?","What would you do if fear had no vote?","Have you asked Him, plainly?"],
    apply:"Pray James 1:5 word for word. Then act on the wisest faithful step in front of you.",
    prayer:"Father, You give generously. I ask for wisdom — not opinion, not preference. Yours. Make the next step plain."
  },
  {id:"prayer",label:"Prayerlessness",tone:"For the one who has stopped talking to Him.",passage:{book:"LUK",chapter:11,verses:[9,10]},
    opening:"You have not stopped praying because He stopped listening. You stopped because you forgot you could.",
    context:"Jesus teaches the disciples to pray — and then tells a story about a man at midnight, asking and asking. The picture is of a Father who is not annoyed by being asked.",
    insight:"Prayerlessness is rarely about busyness. It is about belief — that He hears, that He cares, that He answers. Restore the belief, and the prayer will return.",
    confront:["You have been treating prayer as a performance, not a conversation.","Silence in prayer is not always God's silence. Often it is yours.","You will not pray more by trying harder. You will pray more by remembering whose voice is on the other end."],
    reflect:["When did you last pray honestly, not religiously?","What have you been trying to handle on your own?","What would change if you talked to Him today the way you talk to your closest friend?"],
    apply:"Pray one sentence today. Out loud. Honest. Then another. Build from there.",
    prayer:"Father, here I am. I have been quiet too long. Teach me to ask. Teach me to listen."
  },
  {id:"sin",label:"Caught in Sin",tone:"For the one in the middle of it.",passage:{book:"1JN",chapter:1,verses:[8,9]},
    opening:"The way out begins with confession, not performance.",
    context:"John writes to a community already infected with denial — those who claim to be without sin. The remedy is not pretend better. It is admit.",
    insight:"Confession is not a transaction to earn forgiveness. It is the agreement with God about what is true. The forgiveness is already provided. Confession lets it land.",
    confront:["You have been hiding from the One who already sees.","Repentance is not feeling bad. It is turning around.","Today is not too late. Today is exactly when."],
    reflect:["What specifically do you need to name?","Who, if anyone, do you need to tell?","What turning needs to happen today, not tomorrow?"],
    apply:"Confess. Specifically. To God. To one trusted person if it involves them. Then walk in the other direction.",
    prayer:"Father, I have sinned. I do not minimize it. I do not magnify it past the cross. Forgive me. Cleanse me. Turn me."
  },
  {id:"thanks",label:"Thanksgiving",tone:"For the one who needs to remember what they have.",passage:{book:"PSA",chapter:103,verses:[1,2]},
    opening:"Forgetting is the soul's default. Thanksgiving is its correction.",
    context:"David commands his own soul: bless the Lord, and forget not all His benefits. He is preaching to himself. The text models the discipline.",
    insight:"Gratitude is not the icing on faith. It is its skeleton.",
    confront:["You have been cataloguing what is missing while ignoring what is held.","Complaining is faith in reverse.","Thanksgiving will not feel possible until you start doing it."],
    reflect:["What has He done that you have stopped seeing?","What three things, right now, are you grateful for?","Will you tell Him?"],
    apply:"Write a list of ten benefits. Read it back to Him. Tomorrow, write another.",
    prayer:"Bless the Lord, O my soul, and forget not all His benefits. I name them now."
  },
  {id:"awe",label:"Awe / Worship",tone:"For the one who needs to be reminded who He is.",passage:{book:"PSA",chapter:8,verses:[3,4]},
    opening:"Worship is not generated by working harder. It is recovered by looking up.",
    context:"David, on a hillside, considers the heavens — and is overwhelmed by the disproportion. The God of stars is mindful of him.",
    insight:"Awe is the right response to a real God. Without it, faith becomes management.",
    confront:["You have been treating Him like a vending machine. He is not.","Familiarity has dulled what should still floor you.","If you are bored with God, the boredom is not in Him."],
    reflect:["When did you last simply be still and let Him be God?","What about His character has felt small that needs to feel vast again?","Is there a place — a window, a chair, a walk — where you can recover wonder?"],
    apply:"Step outside today, even briefly. Look at something He made. Say, out loud, 'You are God.' Mean it.",
    prayer:"Lord, You are God. I am not. Restore the wonder. Let me see You with eyes that have stopped pretending to be impressed."
  },
  {id:"injustice",label:"Witnessing Injustice",tone:"For the one watching the world go wrong.",passage:{book:"MIC",chapter:6,verses:[8]},
    opening:"He has shown you what is good. The path is narrow and clear: justice, mercy, humility.",

const STORE={
  prefix:"se.v2.",
  key(k){return this.prefix+k},
  get(k,fb){try{const r=localStorage.getItem(this.key(k));return r?JSON.parse(r):fb}catch(e){return fb}},
  set(k,v){try{localStorage.setItem(this.key(k),JSON.stringify(v));return true}catch(e){return false}},
  pushRecent(listKey,item,max=20){
    const arr=this.get(listKey,[]);
    const next=[item,...arr.filter(x=>JSON.stringify(x)!==JSON.stringify(item))].slice(0,max);
    this.set(listKey,next);return next;
  }
};

/* ============================================================
   BIBLE API CLIENT — fetch chapters with localStorage cache
============================================================ */
const BIBLE_API={
  base:"https://bible.helloao.org/api/BSB",
  cachePrefix:"se.v2.bible:",
  cacheKeys:[],   // tracked for eviction
  maxCache:30,    // chapters
  _key(book,ch){return `${this.cachePrefix}${book}/${ch}`},
  getCached(book,ch){
    try{const r=localStorage.getItem(this._key(book,ch));return r?JSON.parse(r):null}catch(e){return null}
  },
  setCached(book,ch,data){
    try{
      localStorage.setItem(this._key(book,ch),JSON.stringify(data));
      // simple LRU-ish eviction
      const allKeys=Object.keys(localStorage).filter(k=>k.startsWith(this.cachePrefix));
      if(allKeys.length>this.maxCache){
        // Evict the oldest by simple slice (not strict LRU, but bounded)
        const evict=allKeys.length-this.maxCache;
        for(let i=0;i<evict;i++)localStorage.removeItem(allKeys[i]);
      }
    }catch(e){
      // Storage may be full — clear cache and try again
      this.clearCache();
      try{localStorage.setItem(this._key(book,ch),JSON.stringify(data))}catch(_){}
    }
  },
  clearCache(){
    Object.keys(localStorage).filter(k=>k.startsWith(this.cachePrefix)).forEach(k=>localStorage.removeItem(k));
  },
  async fetchChapter(book,ch){
    const cached=this.getCached(book,ch);
    if(cached) return {data:cached,fromCache:true};
    const url=`${this.base}/${book}/${ch}.json`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${url}`);
    const data=await res.json();
    this.setCached(book,ch,data);
    return {data,fromCache:false};
  }
};

function fmtRef(book,ch,verses){
  const name=bookName(book);
  if(!verses) return `${name} ${ch}`;
  if(Array.isArray(verses)){
    if(verses.length===1) return `${name} ${ch}:${verses[0]}`;
    return `${name} ${ch}:${verses[0]}-${verses[verses.length-1]}`;
  }
  return `${name} ${ch}:${verses}`;
}

  if(THEME_SLUGS.has(s)){const t=getTheme(s);return `<a href="#/themes/${s}" class="tag">${esc(t.name)}</a>`}
  return `<a href="#/search?q=${encodeURIComponent(s)}" class="tag">${esc(s)}</a>`;
}

function parseHash(){
  const h=(location.hash||"#/").replace(/^#/,"");
  const [path,query=""]=h.split("?");
  const params={};
  query.split("&").filter(Boolean).forEach(p=>{
    const [k,v]=p.split("=");params[decodeURIComponent(k)]=decodeURIComponent(v||"")
  });
  const parts=path.split("/").filter(Boolean);
  return {path,parts,params};
}

function renderNav(activeRoot){
  const link=(l,cls)=>`<a href="${l.href}" class="${cls} ${activeRoot===l.href.split("?")[0]?"active":""}">${l.label}</a>`;
  $("#navLinks").innerHTML=NAV_ITEMS.map(l=>link(l,"nav-link")).join("");
  $("#navScroll").innerHTML=NAV_ITEMS.map(l=>link(l,"")).join("");
}

function route(){
  const {parts,params}=parseHash();
  const hit=ROUTES.find(r=>r.test(parts))||ROUTES[0];
  const activeRoot="#/"+(parts[0]||"");
  renderNav(activeRoot);
  hideVerseActions();
  closeModals();
  VIEWS[hit.view](parts,params);
  window.scrollTo(0,0);
}

window.addEventListener("hashchange",route);
document.addEventListener("click",(e)=>{
  const a=e.target.closest("a[href^='#']");
  if(!a) return;
  const href=a.getAttribute("href");
  if(href===location.hash){e.preventDefault();route()}
});

/* ---- BIBLE READER ---- */
VIEWS.read=async function(parts,params){
  let bookId=(params.b||"PSA").toUpperCase();
  let chapter=parseInt(params.c||"23",10);
  // Validate
  if(!BOOK_BY_ID[bookId]){bookId="PSA";chapter=23}
  const book=BOOK_BY_ID[bookId];
  if(!chapter||chapter<1||chapter>book.chapters)chapter=1;

  STORE.pushRecent("recentChapters",{book:bookId,ch:chapter});

  $("#app").innerHTML=`
    <main class="page">
      <div class="container">
        <div class="reader-toolbar">
          <div class="left">
            <button class="pill-btn" id="pickBook">${ICO.book} <span id="curBook">${esc(book.name)}</span></button>
            <button class="pill-btn" id="pickChap">Chapter <span id="curChap">${chapter}</span></button>
          </div>
          <div class="right">
            <button class="pill-btn icon-only" id="prevCh" aria-label="Previous chapter">${ICO.arrowLeft}</button>
            <button class="pill-btn icon-only" id="nextCh" aria-label="Next chapter">${ICO.arrowRight}</button>
          </div>
        </div>
        <div class="chamber" id="readerCard">
          <div class="reader-content" id="readerContent">
            <p class="reader-loading">Opening ${esc(book.name)} ${chapter}…</p>
          </div>
        </div>
        <div class="reader-nav">
          <button class="btn btn-ghost btn-sm" id="prevCh2" aria-label="Previous chapter">${ICO.arrowLeft} Previous</button>
          <span class="text-xs text-muted" id="readerStatus"></span>
          <button class="btn btn-ghost btn-sm" id="nextCh2" aria-label="Next chapter">Next ${ICO.arrowRight}</button>
        </div>
      </div>
    </main>`;

  const navTo=(b,c)=>{location.hash=`#/read?b=${b}&c=${c}`};

  $("#pickBook").addEventListener("click",()=>{
    showBookPicker(id=>{showChapterPicker(id,n=>navTo(id,n))});
  });
  $("#pickChap").addEventListener("click",()=>{showChapterPicker(bookId,n=>navTo(bookId,n))});

  const prev=prevChapter(bookId,chapter);
  const next=nextChapter(bookId,chapter);
  const wirePrev=()=>{if(prev)navTo(prev.book,prev.ch);};
  const wireNext=()=>{if(next)navTo(next.book,next.ch);};
  ["#prevCh","#prevCh2"].forEach(s=>{const b=$(s);b.disabled=!prev;b.addEventListener("click",wirePrev)});
  ["#nextCh","#nextCh2"].forEach(s=>{const b=$(s);b.disabled=!next;b.addEventListener("click",wireNext)});

  // Fetch chapter
  try{
    const {data,fromCache}=await BIBLE_API.fetchChapter(bookId,chapter);
    renderChapter(data,bookId,chapter);
    $("#readerStatus").textContent=fromCache?"Cached on your device.":"";
  }catch(e){
    $("#readerContent").innerHTML=`
      <div class="reader-error">
        Could not load ${esc(book.name)} ${chapter}.
        <div class="err-detail">${esc(e.message||"Unknown error")}</div>
        <div class="err-detail">Check your internet connection — Lampstand fetches the Bible text on demand.</div>
      </div>`;
  }
};

function prevChapter(book,ch){
  if(ch>1) return {book,ch:ch-1};
  const idx=BIBLE_BOOKS.findIndex(b=>b.id===book);
  if(idx<=0) return null;
  const prev=BIBLE_BOOKS[idx-1];
  return {book:prev.id,ch:prev.chapters};
}
function nextChapter(book,ch){
  const b=BOOK_BY_ID[book];
  if(ch<b.chapters) return {book,ch:ch+1};
  const idx=BIBLE_BOOKS.findIndex(x=>x.id===book);
  if(idx<0||idx>=BIBLE_BOOKS.length-1) return null;
  return {book:BIBLE_BOOKS[idx+1].id,ch:1};
}

function renderChapter(data,bookId,chapter){
  const host=$("#readerContent");
  if(!data?.chapter?.content){host.innerHTML=`<div class="reader-error">Malformed response.</div>`;return}
  const content=data.chapter.content;
  const footnotes=data.chapter.footnotes||[];
  const fnMap=Object.fromEntries(footnotes.map(f=>[f.noteId,f]));

  const renderInline=(item)=>{
    if(typeof item==="string") return esc(item);
    if(item==null) return "";
    if(item.lineBreak) return "<br/>";
    if(item.heading) return `<strong style="color:var(--gold-200);font-style:italic;">${esc(item.heading)}</strong> `;
    if(item.noteId!=null){
      const fn=fnMap[item.noteId];
      const callerNum=footnotes.findIndex(f=>f.noteId===item.noteId)+1;
      return `<a href="#fn-${item.noteId}" class="fn" title="${esc(fn?.text||"")}">[${callerNum}]</a>`;
    }
    if(item.text!=null){
      const cls=item.wordsOfJesus?"wj":"";
      const txt=esc(item.text);
      return cls?`<span class="${cls}">${txt}</span>`:txt;
    }
    return "";
  };

  let html="";
  let inSubtitle=false;
  for(const block of content){
    if(block.type==="heading"){
      const text=Array.isArray(block.content)?block.content.join(" "):String(block.content||"");
      html+=`<h2 class="reader-heading">${esc(text)}</h2>`;
    } else if(block.type==="line_break"){
      // mostly handled by surrounding flow; keep small spacer
    } else if(block.type==="hebrew_subtitle"){
      const inner=(block.content||[]).map(renderInline).join("");
      html+=`<p class="reader-subtitle">${inner}</p>`;
    } else if(block.type==="verse"){
      // Detect poem level by inspecting first formatted item
      let poemLevel=0;
      const parts=block.content||[];
      const first=parts.find(p=>p&&typeof p==="object"&&p.poem!=null);
      if(first) poemLevel=first.poem;
      const cls=poemLevel===2?"reader-verse poem-2":poemLevel?"reader-verse poem":"reader-verse";
      const inner=parts.map(renderInline).join("");
      html+=`<span class="${cls}" data-vnum="${block.number}"><span class="vnum">${block.number}</span>${inner}</span>`;
    }
  }

  if(footnotes.length){
    html+=`<div class="reader-footnotes"><h4>Footnotes</h4><ol>`;
    footnotes.forEach((fn,i)=>{
      html+=`<li id="fn-${fn.noteId}">${esc(fn.text)}</li>`;
    });
    html+=`</ol></div>`;
  }

  host.innerHTML=html;

  // Wire verse selection
  $$(".reader-verse",host).forEach(v=>{
    v.addEventListener("click",e=>{
      // Don't capture footnote-link clicks
      if(e.target.closest(".fn")) return;
      const num=parseInt(v.getAttribute("data-vnum"),10);
      $$(".reader-verse.selected",host).forEach(s=>s.classList.remove("selected"));
      v.classList.add("selected");
      // Plain text without verse number for copy/journal
      const text=v.textContent.replace(/^\s*\d+\s*/,"").trim();
      showVerseActions(bookId,chapter,num,text);
    });
  });
}

function renderEncounterFlow(enc){
  const steps=["open","passage","context","insight","confront","reflect","apply","prayer"];
  const labels={open:"Open",passage:"Passage",context:"Context",insight:"Insight",confront:"Confront",reflect:"Reflect",apply:"Apply",prayer:"Prayer"};
  const ref=fmtRef(enc.passage.book,enc.passage.chapter,enc.passage.verses);

  $("#app").innerHTML=pageShell({
    kicker:"Guided Encounter",
    title:`For the one dealing with ${enc.label.toLowerCase()}.`,
    subtitle:"Move at your pace. It is not a quiz. It is a conversation.",
    body:`
      <div class="chamber" style="padding:2rem">
        <div class="between mb-6" style="align-items:flex-start;flex-wrap:wrap;gap:.75rem">
          <div>
            <div class="kicker">Encounter</div>
            <h2 class="serif" style="font-size:1.875rem;color:var(--stone-50);margin:.25rem 0 .5rem">${esc(enc.label)}</h2>

          </div>
          <div style="text-align:right" class="hidden-sm">
            <div class="kicker" id="stepCounter"></div>
            <div class="text-gold" id="stepLabel"></div>
          </div>
        </div>
        <div class="progress" id="progress"></div>
        <div id="encStep"></div>
        <div class="mt-10 between">
          <button id="encBack" class="btn btn-ghost">${ICO.arrowLeft} Back</button>
          <button id="encNext" class="btn btn-gold">Next ${ICO.arrowRight}</button>
        </div>
      </div>
      <div class="mt-8"><a href="#/encounter" class="btn btn-ghost">Choose a different state</a></div>`
  });

  let idx=0;
  let passageHtml="<p class='reader-loading'>Loading passage…</p>";
  // Pre-fetch passage in background
  BIBLE_API.fetchChapter(enc.passage.book,enc.passage.chapter).then(({data})=>{
    const verses=enc.passage.verses;
    const out=[];
    (data.chapter.content||[]).forEach(b=>{
      if(b.type==="verse"&&verses.includes(b.number)){
        const text=(b.content||[]).map(c=>{
          if(typeof c==="string") return c;
          if(c?.text) return c.text;
          if(c?.lineBreak) return " ";
          return "";
        }).join("").replace(/\s+/g," ").trim();
        out.push(`<p class="enc-passage" style="margin:0 0 .75rem"><span class="vnum" style="font-family:var(--sans);font-size:.7rem;color:var(--gold-300);margin-right:.5rem;vertical-align:.4em">${b.number}</span>${esc(text)}</p>`);
      }
    });
    passageHtml=out.length?out.join(""):"<p class='text-muted'>(Verse not found in chapter; the passage is still real — try opening it directly.)</p>";
    if(idx===1)render();
  }).catch(e=>{
    passageHtml=`<p class="reader-error" style="font-family:var(--sans);font-size:.9rem">Couldn't load passage. <a href="#/read?b=${enc.passage.book}&c=${enc.passage.chapter}" class="text-gold">Open chapter</a></p>`;
    if(idx===1)render();
  });

  const render=()=>{
    const step=steps[idx];
    $("#progress").innerHTML=steps.map((_,i)=>`<div class="progress-bar ${i<=idx?"on":""}"></div>`).join("");
    $("#stepCounter").textContent=`Step ${idx+1} / ${steps.length}`;
    $("#stepLabel").textContent=labels[step];
    const host=$("#encStep");
    let html="";
    if(step==="open"){
      html=`<div class="enc-step">
        <div class="kicker mb-3">A word before the word</div>
        <p class="serif" style="font-size:1.5rem;line-height:1.5;color:var(--stone-100);margin:0">${esc(enc.opening)}</p>
      </div>`;
    } else if(step==="passage"){
      html=`<div class="enc-step">
        <div class="kicker mb-3">Passage</div>
        <div class="text-gold mb-4">${esc(ref)}</div>
        ${passageHtml}
        <a href="#/read?b=${enc.passage.book}&c=${enc.passage.chapter}" class="text-sm text-gold" style="display:inline-flex;gap:.5rem;align-items:center;margin-top:1.25rem">${ICO.book} Read the full chapter</a>
      </div>`;
    } else if(step==="context"){
      html=`<div class="enc-step"><div class="kicker mb-3">Context</div><p style="font-size:1.125rem;line-height:1.65;color:rgba(236,230,216,.85);margin:0">${esc(enc.context)}</p></div>`;
    } else if(step==="insight"){
      html=`<div class="enc-step"><div class="kicker mb-3">Insight</div><p style="font-size:1.125rem;line-height:1.65;color:rgba(236,230,216,.85);margin:0">${esc(enc.insight)}</p></div>`;
