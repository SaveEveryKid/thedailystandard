,{n:338,t:“Immanuel”,ref:{book:“MAT”,ch:1,v:[23]},body:”‘They shall call his name Immanuel — God with us.’ Not God against us. Not God watching us. God with us. The whole Christian life is a working out of this two-word truth. He is with you in this hour, in the next, in the last. Always with.”,prayer:“Lord, You are with me. Immanuel. I will not forget. In every room I enter today, You enter with me. I am not alone.”}
,{n:339,t:“Glory to God in the Highest”,ref:{book:“LUK”,ch:2,v:[14]},body:”‘Glory to God in the highest, and on earth peace among those with whom he is pleased.’ Glory above. Peace below. The two are tied. When God is glorified, peace breaks out among His people. Most of your unrest is downstream of misplaced glory. Restore the order.”,prayer:“Father, glory to You in the highest. Where I have placed glory elsewhere, restore it to You. Let peace come down where glory rises up.”}
,{n:340,t:“They Came With Haste”,ref:{book:“LUK”,ch:2,v:[16]},body:“The shepherds ‘went with haste and found Mary and Joseph, and the baby lying in a manger.’ They did not delay. They did not wait for a better time. They went. Most of your delays in coming to Him are not from circumstances. They are from postponement. Go with haste.”,prayer:“Lord, I will not postpone. I come to You with haste. Today. Now. No more waiting for a better time. The time is now.”}
,{n:341,t:“They Saw and Made Known”,ref:{book:“LUK”,ch:2,v:[17]},body:”‘When they saw it, they made known the saying that had been told them concerning this child.’ They saw. They told. The order matters. Most poor evangelism comes from telling without having seen. Spend more time seeing. The telling will follow naturally, and it will carry weight.”,prayer:“Father, let me see. Let me really see what You have done. The telling will come from there. Make my witness rooted in fresh sight.”}
,{n:342,t:“He Will Come Again”,ref:{book:“ACT”,ch:1,v:[11]},body:”‘This Jesus, who was taken up from you into heaven, will come in the same way as you saw him go into heaven.’ He came once. He will come again. The first coming was for salvation. The second is for completion. Live in light of the second.”,prayer:“Lord Jesus, You are coming again. Let me live today in the light of that fact. Make me the kind of person You will be glad to find here when You come.”}
,{n:343,t:“Maranatha”,ref:{book:“1CO”,ch:16,v:[22]},body:”‘Maranatha — our Lord, come!’ This was the heart-cry of the early church. Recover it. The Christian life is not just lived between His comings — it is bent forward, longing for the second. Pray it today: Lord, come.”,prayer:“Lord Jesus, come. I bend my heart forward. The world is not my home. Come and finish what You started. Maranatha.”}
,{n:344,t:“As a Thief”,ref:{book:“MAT”,ch:24,v:[44]},body:”‘You also must be ready, for the Son of Man is coming at an hour you do not expect.’ He will come unannounced. Most readiness is for known events. He is asking for readiness for the unknown moment. Live as if today might be the day.”,prayer:“Father, let me be ready today. Not because I expect today specifically — because You said it could be any day. Make me ready in this hour.”}
,{n:345,t:“Watch and Be Ready”,ref:{book:“MAT”,ch:24,v:[42]},body:”‘Stay awake, for you do not know on what day your Lord is coming.’ Stay awake. The metaphor is sleep. Many Christians are spiritually asleep — going through motions without expectation. Wake up. He is coming. Today’s work matters.”,prayer:“Lord, wake me. I have been asleep. I want to be awake when You come. Whether today or in a thousand years. Awake.”}
,{n:346,t:“Like Servants Waiting”,ref:{book:“LUK”,ch:12,v:[36]},body:”‘Be like men who are waiting for their master to come home.’ Servants who are waiting do not stop working. They work with anticipation. They keep the house ready. Today’s tasks are not interruptions of the waiting. They are the form the waiting takes.”,prayer:“Father, let me work as one who is waiting for You to come home. Today’s task is part of my readiness. Make my work a form of waiting.”}
,{n:347,t:“In a Twinkling of an Eye”,ref:{book:“1CO”,ch:15,v:[51,52]},body:”‘We shall all be changed, in a moment, in the twinkling of an eye.’ The change will be instant. What you have struggled with for decades will be undone in a flash when He returns. The slow work of sanctification ends in a sudden, complete transformation. Hold on.”,prayer:“Lord, in a twinkling of an eye, You will finish in me what has felt slow. I trust the sudden completion. Hold me in the long meantime.”}
,{n:348,t:“Where I Am”,ref:{book:“JHN”,ch:14,v:[3]},body:”‘I will come again and will take you to myself, that where I am you may be also.’ Heaven is not a place you go. It is a Person you are with. He is coming back to take you to where He is. The destination is His presence. That is enough.”,prayer:“Father, where Christ is, I will be also. The destination is Your presence. Let me long for You, not just for the place. The Person is the heaven.”}
,{n:349,t:“Behold, I Make All Things New”,ref:{book:“REV”,ch:21,v:[5]},body:”‘Behold, I am making all things new.’ Not all new things — all things new. The same world, restored. The same body, glorified. The same relationships, redeemed. He is not scrapping creation. He is renewing it. What you are losing now will be returned, transformed.”,prayer:“Lord, You are making all things new. What I have lost, You will return. What I am losing now, You will redeem. I trust the renewal of all things.”}
,{n:350,t:“No More Death”,ref:{book:“REV”,ch:21,v:[4]},body:”‘Death shall be no more, neither shall there be mourning, nor crying, nor pain anymore.’ The list of things that will no longer exist is the list of things that have most defined human life. He is undoing all of it. The new creation is not just better. It is different in kind.”,prayer:“Father, no more death. No more mourning. No more pain. The future is not just improved — it is undone of evil. I long for that day.”}
,{n:351,t:“He Will Wipe Every Tear”,ref:{book:“REV”,ch:21,v:[4]},body:”‘He will wipe away every tear from their eyes.’ Notice — He does it personally. Not an angel. Not a delegate. He, the One who made you, will personally wipe the tears you have cried. Every one. The intimacy is staggering.”,prayer:“Lord, You will wipe my tears. Personally. The tears I cried that no one knew about — You will wipe those too. I trust Your hand on the day they end.”}
,{n:352,t:“The Dwelling of God With Man”,ref:{book:“REV”,ch:21,v:[3]},body:”‘The dwelling place of God is with man.’ This was the goal from Eden. To dwell. To be at home with His people. The whole story has been moving toward this. He is coming to live with us — not just visit. Forever.”,prayer:“Father, You will dwell with me. Forever. The whole story has been moving here. I receive the future. I worship the One who comes to live with us.”}
,{n:353,t:“They Will See His Face”,ref:{book:“REV”,ch:22,v:[4]},body:”‘They will see his face, and his name will be on their foreheads.’ His face. Direct. Unveiled. The greatest gift of heaven is not its streets of gold or its absence of pain. It is the face of God. End the year longing for the face.”,prayer:“Lord, I want to see Your face. More than anything else heaven offers. The face is the gift. Carry me to the day I see it.”}
,{n:354,t:“And His Servants Will Worship”,ref:{book:“REV”,ch:22,v:[3]},body:”‘His servants will worship him.’ Worship is the activity of eternity. Not a Sunday hour. The forever life. If worship is hard for you now, it will not be hard then. But practice now. You are training for what you will do forever.”,prayer:“Father, train me to worship. It is not just my Sunday duty. It is my eternal vocation. Practice me now for what I will do forever.”}
,{n:355,t:“The Spirit and the Bride Say, Come”,ref:{book:“REV”,ch:22,v:[17]},body:”‘The Spirit and the Bride say, Come.’ The Spirit in the church and the church itself cry the same prayer at the end: come. The whole story closes with this longing. Join the prayer. Come, Lord Jesus. Come.”,prayer:“Lord Jesus, come. The Spirit says it. The Bride says it. I say it. Come. We are ready. Come and finish what You started.”}
,{n:356,t:“Run With Endurance”,ref:{book:“HEB”,ch:12,v:[1,2]},body:“As the year ends, return to the start. Run with endurance, looking to Jesus. The race continues into next year. The same Vine. The same Spirit. The same cross. The same long obedience. New page, same race.”,prayer:“Father, the year ends. The race continues. Same Vine. Same path. Carry me into next year. I will keep running. I will keep looking to Jesus.”}
,{n:357,t:“Faithful Is He Who Calls”,ref:{book:“1TH”,ch:5,v:[24]},body:”‘He who calls you is faithful; he will surely do it.’ He called you. He will finish it. Whatever you have not yet become — you will be. He is faithful. The work He started is the work He will complete.”,prayer:“Lord, You are faithful. The work You started will be completed. I trust the One who called me. He will surely do it. He will surely finish.”}
,{n:358,t:“To Him Who Loves Us”,ref:{book:“REV”,ch:1,v:[5]},body:”‘To him who loves us and has freed us from our sins by his blood.’ Notice the present tense. Loves. Not loved. Loves. Right now. Freed — past tense, accomplished. The two together: present love, finished freedom. End the year sitting in this.”,prayer:“Father, You love me — present tense. You freed me — finished work. I rest in both. The love does not stop. The freedom is final.”}
,{n:359,t:“A Kingdom of Priests”,ref:{book:“REV”,ch:1,v:[6]},body:”‘He has made us a kingdom, priests to his God and Father.’ You are not just saved. You are appointed. A priest in His kingdom. The role is dignifying and demanding. Live as one who has been crowned and consecrated. Both, daily.”,prayer:“Lord, You have made me a priest. I will not live as a beggar. I am crowned and consecrated. Let my life today reflect both.”}
,{n:360,t:“To Him Be Glory”,ref:{book:“REV”,ch:1,v:[6]},body:”‘To him be glory and dominion forever and ever.’ This is the conclusion of every Christian life. To Him be glory — not to me. The year ends as it began: with the question of whose name is being made great. Make sure it is His.”,prayer:“Father, to You be glory. Not to me. Examine my year. Where I lifted my own name, forgive me. I want Your name to be great in the years ahead.”}
,{n:361,t:“The Alpha and the Omega”,ref:{book:“REV”,ch:1,v:[8]},body:”‘I am the Alpha and the Omega, says the Lord God, who is and who was and who is to come.’ The first letter and the last. The beginning and the end. He bookends everything. The year you are ending began in Him and ended in Him. So will the next.”,prayer:“Lord, You are the Alpha and the Omega. The bookends of my year and my life. Whatever I begin next will begin in You. Whatever I end will end in You.”}

// Compute consecutive-day streak from completion log + last-read timestamp
function devotionalStreak(){
const done=STORE.get(“devotionalDone”,[]);
if(!done.length) return 0;
const sorted=[…done].sort((a,b)=>a-b);
let streak=1;
for(let i=sorted.length-1;i>0;i–){
if(sorted[i]-sorted[i-1]===1) streak++;
else break;
}
return streak;
}
